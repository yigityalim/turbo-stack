name: Setup
description: Set up Bun, restore the Turbo cache, and install dependencies (frozen).

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: latest

    # Turbo's per-package cache survives between runs and is keyed on source
    # hashes, so an unchanged package short-circuits its task.
    - name: Cache Turbo
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: .turbo
        key: ${{ runner.os }}-turbo-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
