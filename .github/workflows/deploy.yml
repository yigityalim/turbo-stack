name: Deploy

# Opt-in Vercel deploy for a single linked project — preview on PRs, production
# on main. Disabled until you set the VERCEL_DEPLOY_ENABLED repo variable to
# "true" and add these secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.
# Multiple apps? Give each its own Vercel project (Git integration) or fan this
# job out with a matrix. Vercel's Git integration is the zero-config alternative.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  vercel:
    name: Vercel (${{ github.event_name == 'push' && 'production' || 'preview' }})
    if: vars.VERCEL_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      TARGET: ${{ github.event_name == 'push' && 'production' || 'preview' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Pull Vercel environment
        run: bunx vercel@latest pull --yes --environment="$TARGET" --token="$VERCEL_TOKEN"

      - name: Build
        run: bunx vercel@latest build ${{ github.event_name == 'push' && '--prod' || '' }} --token="$VERCEL_TOKEN"

      - name: Deploy
        run: |
          url="$(bunx vercel@latest deploy --prebuilt ${{ github.event_name == 'push' && '--prod' || '' }} --token="$VERCEL_TOKEN")"
          echo "Deployed $TARGET → $url"
          {
            echo "### Vercel $TARGET deploy"
            echo "$url"
          } >> "$GITHUB_STEP_SUMMARY"
