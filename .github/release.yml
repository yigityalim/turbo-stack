changelog:
  categories:
    - title: Features
      labels: [feature, enhancement]
    - title: Bug Fixes
      labels: [bug, fix]
    - title: Maintenance
      labels: [chore, ci, docs, refactor, test]
    - title: Dependencies
      labels: [dependencies]
  exclude:
    labels: [skip-changelog]
    authors: ["renovate[bot]"]
